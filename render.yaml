# Render Blueprint for Hock Lee Invoice -> SQL
# Data lives in Supabase (Postgres + Storage), so it persists across deploys.
# On each deploy: install, build, apply DB migrations, then seed the master data.
services:
  - type: web
    name: hl-sql-bot
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build && npx prisma migrate deploy && npx tsx prisma/seed.ts
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      - key: SUPABASE_BUCKET
        value: invoices
      - key: SESSION_SECRET
        generateValue: true
      # --- Secrets: set these in the Render dashboard (sync: false) ---
      - key: DATABASE_URL # Supabase Session-pooler URI (port 5432, IPv4)
        sync: false
      - key: SUPABASE_URL # https://<ref>.supabase.co
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY # Supabase service_role key
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
