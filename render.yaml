# Render Blueprint for Hock Lee Invoice -> SQL
# Free tier: no persistent disk — DB and uploads live in the app directory.
# Data survives sleep/wake cycles but resets on each new deploy.
# When ready for production, add plan: starter + disk section for persistence.
services:
  - type: web
    name: hl-sql-bot
    runtime: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma migrate deploy && npx tsx prisma/seed.ts
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./prisma/prod.db
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_PASSWORD
        sync: false # set in the Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false # set in the Render dashboard
